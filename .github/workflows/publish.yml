name: publish

on:
  workflow_dispatch:
    inputs:
      passcode:
        description: 'DLC Passcode'
        required: true
        type: string
      dlc_id:
        description: 'DLC Identifier'
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Validate DLC Passcode
        run: |
          echo "::add-mask::${{ github.event.inputs.passcode }}"
          if [ -z "${{ secrets.DLC_ADD }}" ] || [ "${{ github.event.inputs.passcode }}" != "${{ secrets.DLC_ADD }}" ]; then
            echo "Error: Invalid DLC passcode"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: 'DLC'

      - name: Write DLC Signal
        run: |
          echo "${{ github.event.inputs.dlc_id }}" > dlc_signal.txt
          echo "DLC_VALUE=${{ github.event.inputs.dlc_id }}" >> $GITHUB_ENV

      - name: Commit and Push DLC
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add dlc_signal.txt
          git commit -m "publish: activate DLC signal ${{ env.DLC_VALUE }}" || echo "No changes to commit"
          git push origin DLC
