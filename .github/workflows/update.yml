name: Trigger Game Update

on:
  workflow_dispatch:
    inputs:
      passcode:
        description: 'Update Passcode'
        required: true
        type: string

permissions:
  contents: write

jobs:
  signal:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Passcode
        run: |
          echo "::add-mask::${{ github.event.inputs.passcode }}"
          if [ -z "${{ secrets.GAME_UPDATE_PASSCODE }}" ] || [ "${{ github.event.inputs.passcode }}" != "${{ secrets.GAME_UPDATE_PASSCODE }}" ]; then
            echo "Error: Invalid passcode"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Write Update Signal
        run: |
          SIGNAL="${{ secrets.PHASE_UPDATE }}"
          if [ -z "$SIGNAL" ]; then
            SIGNAL="IDN:226531"
          fi
          echo "$SIGNAL" > update_signal.txt
          echo "SIGNAL_VALUE=$SIGNAL" >> $GITHUB_ENV

      - name: Commit and Push Signal
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add update_signal.txt
          git commit -m "update: trigger auto-update signal ${{ env.SIGNAL_VALUE }}" || echo "No changes to commit"
          git push
